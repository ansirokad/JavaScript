<body>

    <p>3. **Stack Simulation:** <br>
   - Create an empty array `stack`. Use `push` and `pop` to simulate a stack where you push elements `1`, `2`, and `3` onto the stack, and then pop them off one by one.</p>

    <script>
        // 3. Stack Simulation :

        var stack = [];
        stack.push(1, 2, 3);
        console.log("Push Element : ", stack);

        console.log("Remove Element : ");
        console.log(stack.pop());
        console.log(stack.pop());
        console.log(stack.pop());
    </script>

</body>
