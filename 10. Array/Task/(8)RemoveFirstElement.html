<body>

    <p> 8. **Remove First Element** : <br>
        Remove the first element of an array using `splice`.</p>

    <script>
        // 8. Remove First Element

        var arr = [1, 2, 3, 4, 5];
        console.log(arr);

        arr.splice(0, 1);
        console.log(arr);

    </script>
