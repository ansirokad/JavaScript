<body>

    <p>4. **Insertion and Deletion at the Beginning:** <br>
   - Create an array `letters` with values `['b', 'c']`. Use `unshift` to add `'a'` to the beginning of the array. <br>
   - Use `shift` to remove the first element from the `letters` array.</p>

    <script>
        // 4. Insertion and Deletion at the Beginning :

        var letters = ['b', 'c'];
        console.log(letters);

        letters.unshift('a');
        console.log("Insertion : ", letters);

        letters.shift();
        console.log("Deletion : ", letters);
    </script>
</body>
