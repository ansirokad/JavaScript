    <p>. **Queue Simulation:** <br>
   - Create an empty array `queue`. Use `push` and `shift` to simulate a queue where you add elements `1`, `2`, and `3` in sequence, and then remove them one by one.</p>

    <script>
        // 2. Queue Simulation :

        var queue = [];
        queue.push(1, 2, 3);
        console.log("Push Element : ",queue);

        console.log("Remove Element : ");
        console.log(queue.shift());
        console.log(queue.shift());
        console.log(queue.shift());

    </script>

</body>
