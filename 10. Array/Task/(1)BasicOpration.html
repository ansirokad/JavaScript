<body>

    <p>1. **Basic Operations:** <br>
   - Create an array `numbers` with values `[1, 2, 3]`. Perform `push` to add `4` to the end of the array.
   - Use `pop` to remove the last element from the `numbers` array. Print the array after each operation.</p>

    <script>
        // 1. Basic Operations :

        var numbers = [1, 2, 3];
        numbers.push(4);
        console.log(numbers);

        numbers.pop();
        console.log(numbers);

    </script>
