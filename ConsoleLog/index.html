<body>
    <h1>Html</h1>
    <h2>CSS</h2>
    <h3>JS</h3>

    <script>
        console.time("time");
        // Print Data 
        console.log("This is a JS");
        console.log(100);

        console.timeEnd("time");

        // Clear
        console.clear();

    </script>
