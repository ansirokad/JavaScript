<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        var x = Number(prompt("Enter the value of x : "));
        var y = Number(prompt("Enter the value of y : "));

        console.log("X and Y value are Equal : ", x == y);

        console.log("X and Y value are not Equal to : ", x != y);

        console.log("X value are Greater than Y : ", x > y);

        console.log("X value are Less than Y : ", x < y);

        console.log("X value are Greater than or equal to Y : ", x >= y);

        console.log("X value are Less than or equal tol Y : ", x <= y);
    </script>
</body>

</html>
