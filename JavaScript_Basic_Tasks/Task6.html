<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        var mark = Number(prompt("Enter the Mark : "));

        mark += 10;
        console.log("Mark+= ",mark);

        mark -= 10;
        console.log("Mark-= ",mark);

        mark *= 10;
        console.log("Mark*= ",mark);

        mark /= 10;
        console.log("Mark/= ",mark);
    </script>
</body>

</html>
